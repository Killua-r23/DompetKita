<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Keuangan Keluarga</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --indigo:#6366f1;--indigo-l:#818cf8;--indigo-d:#4f46e5;
  --emerald:#10b981;--rose:#f43f5e;--amber:#f59e0b;--sky:#0ea5e9;--violet:#8b5cf6;
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --border:rgba(148,163,184,.12);
  --r:14px;--r-sm:8px;
  --font:'Segoe UI',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;justify-content:center;}
#app{width:100%;max-width:600px;margin:0 auto;position:relative;min-height:100vh;}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;max-width:600px;margin:0 auto;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border:none;background:none;color:var(--text3);font-size:10px;cursor:pointer;}
.nav-btn.active{color:var(--indigo-l);}
.nav-btn svg{width:22px;height:22px;}
.page{display:none;padding:16px 16px 80px;min-height:100vh;}
.page.active{display:block;}
.page-header{margin-bottom:20px;}
.page-header h1{font-size:22px;font-weight:700;}
.page-header p{font-size:13px;color:var(--text2);}
.card{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);padding:16px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.sc{background:var(--bg2);border-radius:var(--r);padding:14px;border:1px solid var(--border);}
.sc.wide{grid-column:1/-1;}
.sc .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.sc .val{font-size:20px;font-weight:700;}
.green{color:var(--emerald);}.red{color:var(--rose);}
.akun-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;}
.akun-chip{flex-shrink:0;border-radius:var(--r);padding:14px 16px;min-width:150px;cursor:pointer;border:2px solid transparent;}
.akun-chip .ac-ikon{font-size:24px;margin-bottom:8px;}
.akun-chip .ac-nama{font-size:12px;font-weight:600;}
.akun-chip .ac-saldo{font-size:16px;font-weight:800;}
.akun-add{flex-shrink:0;border-radius:var(--r);padding:14px 16px;min-width:100px;background:var(--bg2);border:1px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--text3);}
.period-bar{display:flex;gap:8px;margin-bottom:16px;}
.period-bar select{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--r-sm);}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.filter-bar select,.filter-bar input{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--r-sm);}
.tabs{display:flex;background:var(--bg2);border-radius:var(--r-sm);padding:3px;margin-bottom:16px;}
.tab-btn{flex:1;padding:7px;border-radius:6px;border:none;background:none;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;}
.tab-btn.active{background:var(--indigo);color:#fff;}
.trx-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg2);border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;}
.trx-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.trx-icon.in{background:rgba(16,185,129,.15);}
.trx-icon.out{background:rgba(244,63,94,.15);}
.trx-icon.tf{background:rgba(99,102,241,.15);}
.trx-info{flex:1;}
.trx-info .kat{font-size:13px;font-weight:600;}
.trx-info .ket{font-size:11px;color:var(--text3);}
.trx-right{text-align:right;}
.trx-right .amount{font-size:14px;font-weight:700;}
.trx-right .amount.in{color:var(--emerald);}
.trx-right .amount.out{color:var(--rose);}
.trx-right .date{font-size:10px;color:var(--text3);}
.trx-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;border-radius:20px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;}
.modal h2{font-size:17px;margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;}
.fg input,.fg select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--r-sm);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tipe-toggle{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.tipe-btn{padding:9px;border-radius:var(--r-sm);border:2px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.tipe-btn.active.out{border-color:var(--rose);background:rgba(244,63,94,.1);color:var(--rose);}
.tipe-btn.active.in{border-color:var(--emerald);background:rgba(16,185,129,.1);color:var(--emerald);}
.tipe-btn.active.tf{border-color:var(--violet);background:rgba(139,92,246,.1);color:var(--violet);}
.akun-sel-grid{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.akun-sel-item{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:100px;border:2px solid var(--border);background:var(--bg3);cursor:pointer;}
.akun-sel-item.selected{border-color:var(--indigo);background:rgba(99,102,241,.12);}
.btn{width:100%;padding:13px;border-radius:var(--r-sm);border:none;font-size:15px;font-weight:600;cursor:pointer;}
.btn-primary{background:var(--indigo);color:#fff;}
.btn-danger{background:rgba(244,63,94,.15);color:var(--rose);border:1px solid rgba(244,63,94,.3);}
.budget-item{margin-bottom:12px;}
.pb{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.pb .fill{height:100%;border-radius:3px;}
.fill.ok{background:var(--emerald);}
.fill.warn{background:var(--amber);}
.fill.over{background:var(--rose);}
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:100px;font-size:13px;z-index:999;opacity:0;transition:opacity .2s;white-space:nowrap;}
.toast.show{opacity:1;}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px;}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.setup-screen{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;}
.setup-box{width:100%;max-width:360px;}
.setup-box h1{font-size:28px;font-weight:800;}
.setup-box h1 span{color:var(--indigo-l);}
.fab{position:fixed;bottom:72px;right:16px;width:52px;height:52px;background:var(--indigo);border-radius:50%;border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(99,102,241,.5);z-index:99;}
</style>
</head>
<body>
<div id="app">
<div class="toast" id="toast"></div>
<div class="setup-screen" id="setupScreen">
  <div class="setup-box">
    <div style="font-size:48px;margin-bottom:16px;">💰</div>
    <h1>Keuangan <span>Keluarga</span></h1>
    <p>Masukkan URL Apps Script Anda</p>
    <div class="fg"><label>URL</label><input type="url" id="setupUrl" placeholder="https://script.google.com/macros/s/..."></div>
    <div class="fg"><label>Nama Keluarga</label><input type="text" id="setupNama" value="Keluarga Saya"></div>
    <button class="btn btn-primary" onclick="saveSetup()">Mulai</button>
  </div>
</div>

<!-- 5 Halaman (beranda, transaksi, akun, anggaran, laporan) -->
<div class="page active" id="page-beranda">
  <div class="page-header"><p id="hdrGreet">Selamat datang</p><h1 id="hdrNama">Keuangan</h1></div>
  <div class="period-bar"><select id="selBulan" onchange="loadBeranda()"></select><select id="selTahun" onchange="loadBeranda()"></select></div>
  <div id="berandaContent"><div class="loading">Memuat...</div></div>
</div>

<div class="page" id="page-transaksi">
  <div class="page-header"><h1>Transaksi</h1><p>Riwayat & pencarian</p></div>
  <div class="period-bar"><select id="selBulan2" onchange="loadTransaksi()"></select><select id="selTahun2" onchange="loadTransaksi()"></select></div>
  <div class="filter-bar">
    <select id="filterAkun" onchange="loadTransaksi()"><option>Semua Akun</option></select>
    <select id="filterKategori" onchange="loadTransaksi()"><option>Semua Kategori</option></select>
    <input type="text" id="searchTrx" placeholder="Cari..." onkeyup="loadTransaksi()">
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="filterTrx('semua',this)">Semua</button>
    <button class="tab-btn" onclick="filterTrx('pemasukan',this)">Masuk</button>
    <button class="tab-btn" onclick="filterTrx('pengeluaran',this)">Keluar</button>
    <button class="tab-btn" onclick="filterTrx('transfer',this)">Transfer</button>
  </div>
  <div id="trxList"></div>
</div>

<div class="page" id="page-akun">
  <div class="page-header"><h1>Akun Dana</h1><p>Termasuk Hutang & Piutang (1 akun masing-masing)</p></div>
  <div id="akunList"></div>
  <button class="btn btn-primary" onclick="openAkunModal()">+ Tambah Akun</button>
  <div class="st" style="margin-top:20px; display:flex; justify-content:space-between;"><span>Kategori</span><span style="color:var(--indigo-l);cursor:pointer;" onclick="openKategoriModal()">Kelola</span></div>
  <div id="kategoriList"></div>
</div>

<div class="page" id="page-anggaran">
  <div class="page-header"><h1>Anggaran</h1></div>
  <div class="period-bar"><select id="selBulan3" onchange="loadAnggaran()"></select><select id="selTahun3" onchange="loadAnggaran()"></select></div>
  <div id="anggaranContent"></div>
  <button class="btn btn-primary" onclick="openAnggaranModal()">+ Atur Anggaran</button>
</div>

<div class="page" id="page-laporan">
  <div class="page-header"><h1>Laporan</h1></div>
  <div class="period-bar"><select id="selTahunL" onchange="loadLaporan()"></select></div>
  <div id="laporanContent"></div>
  <button class="btn btn-primary" onclick="exportCSV()">Export CSV</button>
</div>

<nav>
  <button class="nav-btn active" onclick="navTo('beranda',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Beranda</button>
  <button class="nav-btn" onclick="navTo('transaksi',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Transaksi</button>
  <button class="nav-btn" onclick="navTo('akun',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Akun</button>
  <button class="nav-btn" onclick="navTo('anggaran',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Anggaran</button>
  <button class="nav-btn" onclick="navTo('laporan',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Laporan</button>
</nav>

<button class="fab" id="fabBtn" onclick="openTrxModal()">+</button>

<!-- Modal transaksi, kategori, anggaran, akun (sederhana, tidak banyak berubah) -->
<div class="modal-overlay" id="trxModal"><div class="modal"><button class="modal-close" onclick="closeModal('trxModal')">✕</button><h2 id="trxModalTitle">Transaksi</h2><input type="hidden" id="trxEditId">
<div class="fg"><label>Tipe</label><div class="tipe-toggle"><button class="tipe-btn out" onclick="setTipe('pengeluaran')">Keluar</button><button class="tipe-btn in" onclick="setTipe('pemasukan')">Masuk</button><button class="tipe-btn tf" onclick="setTipe('transfer')">Transfer</button></div></div>
<div id="fieldAkunDari"><label>Dari Akun</label><div class="akun-sel-grid" id="akunDariGrid"></div></div>
<div id="fieldAkunKe" style="display:none;"><label>Ke Akun</label><div class="akun-sel-grid" id="akunKeGrid"></div></div>
<div id="fieldTransfer" style="display:none;"><div><label>Dari Akun</label><div class="akun-sel-grid" id="akunDariGridTf"></div></div><div style="text-align:center;padding:4px;">↓</div><div><label>Ke Akun</label><div class="akun-sel-grid" id="akunKeGridTf"></div></div></div>
<div class="row2"><div><label>Tanggal</label><input type="date" id="trxTanggal"></div><div><label>Jumlah</label><input type="number" id="trxJumlah" placeholder="0"></div></div>
<div id="fieldKategori"><label>Kategori</label><select id="trxKategori"></select></div>
<div><label>Keterangan (opsional)</label><input type="text" id="trxKet" placeholder="Contoh: hutang ke Budi, tagihan listrik"></div>
<button class="btn btn-primary" onclick="saveTrx()" id="saveTrxBtn">Simpan</button>
<button class="btn btn-danger" id="deleteTrxBtn" style="display:none;" onclick="deleteTrxConfirm()">Hapus</button>
</div></div>

<div class="modal-overlay" id="akunModal"><div class="modal"><button class="modal-close" onclick="closeModal('akunModal')">✕</button><h2 id="akunModalTitle">Akun</h2><input type="hidden" id="akunEditId">
<div><label>Nama</label><input type="text" id="akunNama"></div>
<div><label>Tipe</label><select id="akunTipe"><option value="cash">Tunai</option><option value="bank">Bank</option><option value="ewallet">E-Wallet</option><option value="investasi">Investasi</option><option value="hutang">Hutang</option><option value="piutang">Piutang</option></select></div>
<div><label>Ikon</label><select id="akunIkon"><option>🏦</option><option>💳</option><option>💵</option><option>📱</option><option>💚</option><option>🤝</option><option>💰</option></select></div>
<div><label>Warna</label><input type="color" id="akunWarna" value="#10b981"></div>
<div><label>Saldo Awal</label><input type="number" id="akunSaldo" value="0"></div>
<button class="btn btn-primary" onclick="saveAkun()">Simpan</button>
<button class="btn btn-danger" id="btnHapusAkun" style="display:none;" onclick="hapusAkun()">Hapus</button>
</div></div>

<div class="modal-overlay" id="kategoriModal"><div class="modal"><button class="modal-close" onclick="closeModal('kategoriModal')">✕</button><h2>Kategori</h2><div id="kategoriManager"></div><div class="row2"><input type="text" id="newKatNama" placeholder="Nama"><select id="newKatTipe"><option>pengeluaran</option><option>pemasukan</option></select></div><button class="btn btn-primary" onclick="addNewKategori()">Tambah</button></div></div>

<div class="modal-overlay" id="anggaranModal"><div class="modal"><button class="modal-close" onclick="closeModal('anggaranModal')">✕</button><h2>Anggaran</h2><div><label>Kategori</label><select id="angKategori"></select></div><div><label>Batas</label><input type="number" id="angBatas"></div><button class="btn btn-primary" onclick="saveAnggaran()">Simpan</button></div></div>

<script>
// STATE
let API_URL = localStorage.getItem("kk_api_url") || "";
let NAMA = localStorage.getItem("kk_nama") || "Keluarga Saya";
let currentTipe = "pengeluaran";
let currentTrxFilter = "semua";
let allTrxData = [];
let akunCache = [];
let kategoriCache = { pemasukan:[], pengeluaran:[] };
let selectedAkunDari = null, selectedAkunKe = null;
let editingTrxId = null;
let chartLine = null;
const MONTHS = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
const TIPE_AKUN = { cash:"Tunai", bank:"Bank", ewallet:"E-Wallet", investasi:"Investasi", hutang:"Hutang", piutang:"Piutang" };

window.addEventListener("load", () => {
  if (!API_URL) { document.getElementById("setupScreen").style.display = "flex"; return; }
  document.getElementById("setupScreen").style.display = "none";
  init();
});
async function init() {
  document.getElementById("hdrNama").innerHTML = NAMA;
  const h = new Date().getHours();
  document.getElementById("hdrGreet").innerHTML = h<11?"Pagi ☀️":h<15?"Siang 🌤️":h<18?"Sore 🌅":"Malam 🌙";
  buildPeriodSelectors();
  await loadAkunCache();
  await loadKategori();
  loadBeranda();
}
function saveSetup() {
  const url = document.getElementById("setupUrl").value.trim();
  const nama = document.getElementById("setupNama").value.trim();
  if (!url) { showToast("URL tidak valid","error"); return; }
  localStorage.setItem("kk_api_url", url);
  localStorage.setItem("kk_nama", nama);
  API_URL = url; NAMA = nama;
  document.getElementById("setupScreen").style.display = "none";
  init();
}
function buildPeriodSelectors() {
  const now = new Date(), cm = now.getMonth()+1, cy = now.getFullYear();
  ["selBulan","selBulan2","selBulan3"].forEach(id => {
    document.getElementById(id).innerHTML = MONTHS.map((m,i) => `<option value="${i+1}" ${i+1===cm?"selected":""}>${m}</option>`).join("");
  });
  ["selTahun","selTahun2","selTahun3","selTahunL"].forEach(id => {
    document.getElementById(id).innerHTML = [cy-1,cy,cy+1].map(y => `<option value="${y}" ${y===cy?"selected":""}>${y}</option>`).join("");
  });
}
function getPeriod(suf="") { return { bulan: document.getElementById("selBulan"+suf).value, tahun: document.getElementById("selTahun"+suf).value }; }
async function apiGet(params) { const r = await fetch(`${API_URL}?${new URLSearchParams(params)}`); return r.json(); }
async function apiPost(data) { const r = await fetch(API_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify(data) }); return r.json(); }
async function loadAkunCache() { const res = await apiGet({action:"getSaldoAkun"}); akunCache = res.data || []; }
async function loadKategori() { const res = await apiGet({action:"getKategori"}); kategoriCache = { pemasukan:[], pengeluaran:[] }; (res.data||[]).forEach(k => { kategoriCache[k.Tipe].push(k); }); }
function getKategoriOptions(tipe) { return kategoriCache[tipe].map(k => `<option value="${k.Nama}">${k.Ikon||"📦"} ${k.Nama}</option>`).join(""); }
function getAkunNama(id) { const a = akunCache.find(a=>a.id===id); return a ? `${a.ikon} ${a.nama}` : id; }
function fmt(n) { let num=parseFloat(n||0); if(num<0) return "-"+fmt(-num); if(num>=1e6) return "Rp "+(num/1e6).toFixed(1)+"jt"; if(num>=1e3) return "Rp "+(num/1e3).toFixed(0)+"rb"; return "Rp "+num.toLocaleString("id-ID"); }
function showToast(msg,type="info") { let t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2500); }

function navTo(page,btn) {
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+page).classList.add("active");
  if(btn) btn.classList.add("active");
  let fab = document.getElementById("fabBtn");
  if(page==="beranda"||page==="transaksi") fab.style.display="flex"; else fab.style.display="none";
  if(page==="transaksi") loadTransaksi();
  if(page==="akun") loadAkunPage();
  if(page==="anggaran") loadAnggaran();
  if(page==="laporan") loadLaporan();
}
function openModal(id){ document.getElementById(id).classList.add("open"); }
function closeModal(id){ document.getElementById(id).classList.remove("open"); }
document.querySelectorAll(".modal-overlay").forEach(m => { m.addEventListener("click",e=>{ if(e.target===m) m.classList.remove("open"); }); });

// BERANDA
async function loadBeranda() {
  let {bulan,tahun}=getPeriod();
  document.getElementById("berandaContent").innerHTML=`<div class="loading">Memuat...</div>`;
  try {
    let [resSummary, resSaldo] = await Promise.all([apiGet({action:"getSummary",bulan,tahun}), apiGet({action:"getSaldoAkun"})]);
    akunCache = resSaldo.data||[];
    renderBeranda(resSummary.data, akunCache, bulan, tahun);
  } catch(e){ document.getElementById("berandaContent").innerHTML=`<div class="empty">⚠️ ${e.message}</div>`; }
}
function renderBeranda(d, saldoAkun, bulan, tahun) {
  let totalSemua = saldoAkun.reduce((s,a)=>s+a.saldo,0);
  let aset = saldoAkun.filter(a => ["cash","bank","ewallet","investasi","piutang"].includes(a.tipe));
  let hutangArr = saldoAkun.filter(a => a.tipe === "hutang");
  let totalAset = aset.reduce((s,a)=>s+a.saldo,0);
  let totalHutang = hutangArr.reduce((s,a)=>s+a.saldo,0);
  let kekayaan = totalAset - totalHutang;
  let akunHtml = `<div class="akun-scroll">` + saldoAkun.map(a=>`<div class="akun-chip" style="background:${a.warna}22;border:1.5px solid ${a.warna}44;" onclick="navTo('akun',null)"><div class="ac-ikon">${a.ikon}</div><div class="ac-nama">${a.nama}</div><div class="ac-saldo" style="color:${a.warna};">${fmt(a.saldo)}</div></div>`).join("") + `<div class="akun-add" onclick="openAkunModal()">＋ Tambah</div></div>`;
  let ringkasan = `<div class="sg"><div class="sc wide"><div class="lbl">Total Semua Akun</div><div class="val">${fmt(totalSemua)}</div></div></div>
    <div class="sg"><div class="sc"><div class="lbl">Total Aset</div><div class="val green">${fmt(totalAset)}</div></div><div class="sc"><div class="lbl">Total Hutang</div><div class="val" style="color:#f97316;">${fmt(totalHutang)}</div></div><div class="sc wide"><div class="lbl">Kekayaan Bersih</div><div class="val ${kekayaan>=0?'green':'red'}">${fmt(kekayaan)}</div></div></div>
    <div class="sg"><div class="sc"><div class="lbl">Pemasukan</div><div class="val green">${fmt(d.pemasukan)}</div></div><div class="sc"><div class="lbl">Pengeluaran</div><div class="val red">${fmt(d.pengeluaran)}</div></div><div class="sc wide"><div class="lbl">Selisih</div><div class="val ${d.saldo>=0?'green':'red'}">${fmt(d.saldo)}</div></div></div>`;
  let topKat = Object.entries(d.perKategori).sort((a,b)=>b[1]-a[1]).slice(0,3);
  let topHtml = "";
  if(topKat.length){ topHtml = `<div class="st">Top Pengeluaran</div>` + topKat.map(([k,j])=>`<div class="budget-item"><div>${k}</div><div class="pb"><div class="fill ok" style="width:${d.pengeluaran>0?Math.round(j/d.pengeluaran*100):0}%;"></div></div><div>${fmt(j)}</div></div>`).join(""); }
  let recentHtml = d.recent?.length ? `<div class="st">Terakhir <span style="float:right;color:var(--indigo-l);cursor:pointer;" onclick="navTo('transaksi',null)">Lihat semua →</span></div>` + d.recent.map(t=>renderTrxItem(t,false)).join("") : "";
  document.getElementById("berandaContent").innerHTML = akunHtml + ringkasan + topHtml + recentHtml;
}

// TRANSAKSI (ringkas)
async function loadTransaksi() {
  let {bulan,tahun}=getPeriod("2");
  let params={action:"getTransaksi",bulan,tahun};
  if(currentTrxFilter!=="semua") params.tipe=currentTrxFilter;
  try {
    let res=await apiGet(params);
    allTrxData=res.data;
    let filterAkun=document.getElementById("filterAkun").value;
    let filterKat=document.getElementById("filterKategori").value;
    let search=document.getElementById("searchTrx").value.toLowerCase();
    let filtered=allTrxData;
    if(filterAkun) filtered=filtered.filter(t=>t.AkunDari===filterAkun||t.AkunKe===filterAkun);
    if(filterKat) filtered=filtered.filter(t=>t.Kategori===filterKat);
    if(search) filtered=filtered.filter(t=>(t.Keterangan||"").toLowerCase().includes(search)||(t.Kategori||"").toLowerCase().includes(search));
    renderTrxList(filtered);
    document.getElementById("filterAkun").innerHTML = '<option value="">Semua Akun</option>'+akunCache.map(a=>`<option value="${a.id}">${a.ikon} ${a.nama}</option>`).join('');
    let katSet=new Set(); allTrxData.forEach(t=>{ if(t.Kategori) katSet.add(t.Kategori); });
    document.getElementById("filterKategori").innerHTML = '<option value="">Semua Kategori</option>'+Array.from(katSet).map(k=>`<option value="${k}">${k}</option>`).join('');
  } catch(e){ document.getElementById("trxList").innerHTML=`<div class="empty">${e.message}</div>`; }
}
function filterTrx(tipe,btn){ currentTrxFilter=tipe; document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active")); if(btn) btn.classList.add("active"); loadTransaksi(); }
function renderTrxList(data){
  let el=document.getElementById("trxList");
  if(!data.length){ el.innerHTML='<div class="empty">Tidak ada transaksi</div>'; return; }
  el.innerHTML=data.map(t=>renderTrxItem(t,true)).join("");
}
function renderTrxItem(t,showDel){
  let cls=t.Tipe==="pemasukan"?"in":t.Tipe==="transfer"?"tf":"out";
  let icon=t.Tipe==="transfer"?"🔄":(t.Tipe==="pemasukan"?"💰":"💸");
  let tanggal=t.Tanggal?new Date(t.Tanggal).toLocaleDateString("id-ID",{day:"numeric",month:"short"}):"-";
  let prefix=t.Tipe==="pemasukan"?"+":t.Tipe==="transfer"?"↕":"-";
  let akunTag="";
  if(t.Tipe==="pengeluaran" && t.AkunDari) akunTag=`<div>📤 ${getAkunNama(t.AkunDari)}</div>`;
  if(t.Tipe==="pemasukan" && t.AkunKe) akunTag=`<div>📥 ${getAkunNama(t.AkunKe)}</div>`;
  if(t.Tipe==="transfer") akunTag=`<div>${getAkunNama(t.AkunDari)} → ${getAkunNama(t.AkunKe)}</div>`;
  let delBtn=showDel?`<button class="trx-del" onclick="event.stopPropagation();deleteTrx('${t.ID}')">✕</button>`:"";
  return `<div class="trx-item" onclick="editTrx('${t.ID}')"><div class="trx-icon ${cls}">${icon}</div><div class="trx-info"><div class="kat">${t.Kategori||t.Tipe}</div><div class="ket">${t.Keterangan||""}</div>${akunTag}</div><div class="trx-right"><div class="amount ${cls}">${prefix}${fmt(t.Jumlah)}</div><div class="date">${tanggal}</div></div>${delBtn}</div>`;
}
async function deleteTrx(id){ if(confirm("Hapus?")){ await apiPost({action:"deleteTransaksi",id}); loadTransaksi(); loadBeranda(); } }
function editTrx(id){ let trx=allTrxData.find(t=>t.ID===id); if(!trx) return; editingTrxId=id; document.getElementById("trxModalTitle").innerText="Edit Transaksi"; document.getElementById("trxEditId").value=id; document.getElementById("trxTanggal").value=trx.Tanggal; document.getElementById("trxJumlah").value=trx.Jumlah; document.getElementById("trxKet").value=trx.Keterangan||""; setTipe(trx.Tipe); setTimeout(()=>{ if(trx.Tipe==="pengeluaran") selectAkun("dari",trx.AkunDari); if(trx.Tipe==="pemasukan") selectAkun("ke",trx.AkunKe); if(trx.Tipe==="transfer"){ selectAkun("dari_tf",trx.AkunDari); selectAkun("ke_tf",trx.AkunKe); } let katSelect=document.getElementById("trxKategori"); for(let i=0;i<katSelect.options.length;i++) if(katSelect.options[i].value===trx.Kategori) katSelect.selectedIndex=i; },100); document.getElementById("deleteTrxBtn").style.display="block"; openModal("trxModal"); }
function deleteTrxConfirm(){ if(editingTrxId) deleteTrx(editingTrxId); closeModal("trxModal"); editingTrxId=null; document.getElementById("deleteTrxBtn").style.display="none"; }
function openTrxModal(){ editingTrxId=null; document.getElementById("trxModalTitle").innerText="Tambah Transaksi"; document.getElementById("trxEditId").value=""; document.getElementById("trxTanggal").value=new Date().toISOString().split("T")[0]; document.getElementById("trxJumlah").value=""; document.getElementById("trxKet").value=""; setTipe("pengeluaran"); document.getElementById("deleteTrxBtn").style.display="none"; openModal("trxModal"); }
function setTipe(tipe){
  currentTipe=tipe;
  ["pengeluaran","pemasukan","transfer"].forEach(t=>{ let el=document.getElementById("tipe"+t.charAt(0).toUpperCase()+t.slice(1)); if(el) el.className=`tipe-btn ${t==="pengeluaran"?"out":t==="pemasukan"?"in":"tf"}${t===tipe?" active":""}`; });
  document.getElementById("fieldAkunDari").style.display=tipe==="pengeluaran"?"block":"none";
  document.getElementById("fieldAkunKe").style.display=tipe==="pemasukan"?"block":"none";
  document.getElementById("fieldTransfer").style.display=tipe==="transfer"?"block":"none";
  document.getElementById("fieldKategori").style.display=tipe==="transfer"?"none":"block";
  let kats = tipe==="pemasukan"?kategoriCache.pemasukan:kategoriCache.pengeluaran;
  document.getElementById("trxKategori").innerHTML = kats.map(k=>`<option value="${k.Nama}">${k.Ikon||"📦"} ${k.Nama}</option>`).join("");
  buildAkunSelector("akunDariGrid","dari"); buildAkunSelector("akunKeGrid","ke"); buildAkunSelector("akunDariGridTf","dari_tf"); buildAkunSelector("akunKeGridTf","ke_tf");
}
function buildAkunSelector(gridId,role){ let el=document.getElementById(gridId); if(!el) return; el.innerHTML=akunCache.map(a=>`<div class="akun-sel-item" id="asel_${role}_${a.id}" onclick="selectAkun('${role}','${a.id}')"><span>${a.ikon}</span><span>${a.nama}</span><span>${fmt(a.saldo)}</span></div>`).join(""); }
function selectAkun(role,id){
  if(role==="dari"||role==="dari_tf"){ selectedAkunDari=id; document.querySelectorAll("[id^='asel_dari_'], [id^='asel_dari_tf_']").forEach(el=>el.classList.remove("selected")); document.getElementById(`asel_${role}_${id}`)?.classList.add("selected"); }
  if(role==="ke"||role==="ke_tf"){ selectedAkunKe=id; document.querySelectorAll("[id^='asel_ke_'], [id^='asel_ke_tf_']").forEach(el=>el.classList.remove("selected")); document.getElementById(`asel_${role}_${id}`)?.classList.add("selected"); }
}
async function saveTrx(){
  let jumlah=parseFloat(document.getElementById("trxJumlah").value);
  let tanggal=document.getElementById("trxTanggal").value;
  if(!tanggal||!jumlah){ showToast("Lengkapi data","error"); return; }
  if(currentTipe==="pengeluaran" && !selectedAkunDari){ showToast("Pilih akun sumber","error"); return; }
  if(currentTipe==="pemasukan" && !selectedAkunKe){ showToast("Pilih akun tujuan","error"); return; }
  if(currentTipe==="transfer" && (!selectedAkunDari||!selectedAkunKe)){ showToast("Pilih akun asal & tujuan","error"); return; }
  let data = { tipe:currentTipe, tanggal, jumlah, kategori:currentTipe==="transfer"?"Transfer":document.getElementById("trxKategori").value, keterangan:document.getElementById("trxKet").value, akunDari:currentTipe==="pemasukan"?"":selectedAkunDari, akunKe:currentTipe==="pengeluaran"?"":selectedAkunKe };
  let editId=document.getElementById("trxEditId").value;
  let action=editId?"updateTransaksi":"addTransaksi";
  let payload=editId?{action,id:editId,data}:{action,data};
  let btn=document.getElementById("saveTrxBtn");
  btn.disabled=true; btn.textContent="Menyimpan...";
  try{ let res=await apiPost(payload); if(!res.success) throw new Error(res.message); showToast(editId?"Update OK":"Tambah OK","success"); closeModal("trxModal"); await loadAkunCache(); loadBeranda(); loadTransaksi(); } catch(e){ showToast(e.message,"error"); } finally{ btn.disabled=false; btn.textContent="Simpan"; }
}

// AKUN PAGE, KATEGORI, DLL (sederhana)
async function loadAkunPage(){ await loadAkunCache(); let el=document.getElementById("akunList"); if(!akunCache.length){ el.innerHTML='<div class="empty">Belum ada akun</div>'; return; } let total=akunCache.reduce((s,a)=>s+a.saldo,0); let html=`<div class="sc wide"><div class="lbl">Total Akun</div><div class="val">${fmt(total)}</div></div>`; akunCache.forEach(a=>{ html+=`<div class="card" style="border-left:3px solid ${a.warna};"><div style="display:flex;gap:12px;"><div style="font-size:32px;">${a.ikon}</div><div><div><b>${a.nama}</b></div><div>${TIPE_AKUN[a.tipe]}</div></div><div style="margin-left:auto;text-align:right;"><div style="font-weight:800;">${fmt(a.saldo)}</div><button onclick="editAkun('${a.id}')">Edit</button></div></div></div>`; }); el.innerHTML=html; await loadKategoriDisplay(); }
async function loadKategoriDisplay(){ let res=await apiGet({action:"getKategori"}); let kats=res.data||[]; let out=kats.filter(k=>k.Tipe==="pengeluaran"); let inn=kats.filter(k=>k.Tipe==="pemasukan"); document.getElementById("kategoriList").innerHTML=`<div class="card"><div>Pengeluaran</div>${out.map(k=>`<div>${k.Ikon} ${k.Nama} <button onclick="editKategori('${k.Tipe}','${k.Nama}')">✏️</button></div>`).join("")}</div><div class="card"><div>Pemasukan</div>${inn.map(k=>`<div>${k.Ikon} ${k.Nama} <button onclick="editKategori('${k.Tipe}','${k.Nama}')">✏️</button></div>`).join("")}</div>`; }
function openKategoriModal(){ loadKategoriDisplay(); openModal("kategoriModal"); }
async function addNewKategori(){ let nama=document.getElementById("newKatNama").value.trim(); let tipe=document.getElementById("newKatTipe").value; if(!nama){ showToast("Nama harus diisi","error"); return; } await apiPost({action:"addKategori",data:{tipe,nama,ikon:"📦"}}); await loadKategori(); await loadKategoriDisplay(); showToast("OK","success"); document.getElementById("newKatNama").value=""; }
function editKategori(tipe,nama){ let newNama=prompt("Edit nama:",nama); if(newNama && newNama!==nama){ apiPost({action:"updateKategori",oldNama:nama,data:{tipe,nama:newNama,ikon:"📦"}}).then(()=>{ loadKategori(); loadKategoriDisplay(); }); } }
function openAkunModal(id=null){ document.getElementById("akunModalTitle").innerHTML=id?"Edit Akun":"Tambah Akun"; document.getElementById("akunEditId").value=id||""; document.getElementById("akunNama").value=""; document.getElementById("akunSaldo").value="0"; document.getElementById("akunTipe").value="cash"; document.getElementById("akunIkon").value="🏦"; document.getElementById("akunWarna").value="#10b981"; document.getElementById("btnHapusAkun").style.display=id?"block":"none"; if(id){ let a=akunCache.find(a=>a.id===id); if(a){ document.getElementById("akunNama").value=a.nama; document.getElementById("akunTipe").value=a.tipe; document.getElementById("akunIkon").value=a.ikon; document.getElementById("akunWarna").value=a.warna; } } openModal("akunModal"); }
function editAkun(id){ openAkunModal(id); }
async function saveAkun(){ let id=document.getElementById("akunEditId").value; let data={ nama:document.getElementById("akunNama").value.trim(), tipe:document.getElementById("akunTipe").value, ikon:document.getElementById("akunIkon").value, warna:document.getElementById("akunWarna").value, saldoAwal:parseFloat(document.getElementById("akunSaldo").value)||0 }; if(!data.nama){ showToast("Nama harus diisi","error"); return; } let res=await apiPost(id?{action:"updateAkun",id,data}:{action:"addAkun",data}); if(!res.success) throw new Error(res.message); showToast(id?"Update OK":"Tambah OK","success"); closeModal("akunModal"); await loadAkunCache(); loadAkunPage(); }
async function hapusAkun(){ let id=document.getElementById("akunEditId").value; if(!id||!confirm("Hapus akun?")) return; await apiPost({action:"deleteAkun",id}); showToast("Hapus OK","success"); closeModal("akunModal"); await loadAkunCache(); loadAkunPage(); }

async function loadAnggaran(){ let {bulan,tahun}=getPeriod("3"); let periode=`${tahun}-${String(bulan).padStart(2,"0")}`; document.getElementById("anggaranContent").innerHTML=`<div class="loading">Memuat...</div>`; try{ let [ra,rt]=await Promise.all([apiGet({action:"getAnggaran",periode}), apiGet({action:"getTransaksi",bulan,tahun})]); renderAnggaran(ra.data||[],rt.data||[]); } catch(e){ document.getElementById("anggaranContent").innerHTML=`<div class="empty">${e.message}</div>`; } }
function renderAnggaran(anggaran,transaksi){ let rs={}; transaksi.filter(t=>t.Tipe==="pengeluaran").forEach(t=>{ rs[t.Kategori]=(rs[t.Kategori]||0)+parseFloat(t.Jumlah||0); }); if(!anggaran.length){ document.getElementById("anggaranContent").innerHTML='<div class="empty">Belum ada anggaran</div>'; return; } let html=""; anggaran.forEach(a=>{ let spent=rs[a.Kategori]||0, batas=parseFloat(a.Batas||0), pct=batas>0?Math.min(100,Math.round((spent/batas)*100)):0; html+=`<div class="card"><div>${a.Kategori}</div><div>${fmt(spent)} / ${fmt(batas)}</div><div class="pb"><div class="fill ${pct>100?'over':pct>80?'warn':'ok'}" style="width:${pct}%;"></div></div><div>${pct>100?'Melebihi':'Sisa '+fmt(batas-spent)}</div></div>`; }); document.getElementById("anggaranContent").innerHTML=html; }
function openAnggaranModal(){ document.getElementById("angKategori").innerHTML=getKategoriOptions("pengeluaran"); document.getElementById("angBatas").value=""; openModal("anggaranModal"); }
async function saveAnggaran(){ let {bulan,tahun}=getPeriod("3"); let periode=`${tahun}-${String(bulan).padStart(2,"0")}`; let data={periode, kategori:document.getElementById("angKategori").value, batas:document.getElementById("angBatas").value}; if(!data.batas){ showToast("Masukkan batas","error"); return; } await apiPost({action:"setAnggaran",data}); showToast("Anggaran disimpan","success"); closeModal("anggaranModal"); loadAnggaran(); }
async function loadLaporan(){ let tahun=document.getElementById("selTahunL").value; document.getElementById("laporanContent").innerHTML=`<div class="loading">Memuat...</div>`; try{ let res=await apiGet({action:"getLaporan",tahun}); renderLaporan(res.data,tahun); } catch(e){ document.getElementById("laporanContent").innerHTML=`<div class="empty">${e.message}</div>`; } }
function renderLaporan(data,tahun){
  let bln=data.bulanan, masuk=Object.values(bln).map(b=>b.pemasukan), keluar=Object.values(bln).map(b=>b.pengeluaran);
  let totalIn=masuk.reduce((a,b)=>a+b,0), totalOut=keluar.reduce((a,b)=>a+b,0);
  let labels=["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
  document.getElementById("laporanContent").innerHTML = `<div class="card"><canvas id="chartLaporan" style="height:200px;"></canvas></div><div class="card">${masuk.map((v,i)=>`<div>${labels[i]}: Masuk ${fmt(v)} | Keluar ${fmt(keluar[i])}</div>`).join("")}<div>Total Masuk ${fmt(totalIn)} | Total Keluar ${fmt(totalOut)} | Surplus ${fmt(totalIn-totalOut)}</div></div>`;
  setTimeout(()=>{ let ctx=document.getElementById("chartLaporan").getContext("2d"); if(chartLine) chartLine.destroy(); chartLine=new Chart(ctx,{type:"bar",data:{labels,datasets:[{label:"Masuk",data:masuk,backgroundColor:"#10b981"},{label:"Keluar",data:keluar,backgroundColor:"#f43f5e"}]}}); },100);
}
async function exportCSV(){ let tahun=document.getElementById("selTahunL").value; let res=await apiGet({action:"getTransaksi",tahun}); let data=res.data||[]; if(!data.length){ showToast("Tidak ada data","error"); return; } let headers=["ID","Tanggal","Tipe","Kategori","Keterangan","Jumlah","AkunDari","AkunKe"]; let rows=data.map(t=>[t.ID,t.Tanggal,t.Tipe,t.Kategori,t.Keterangan,t.Jumlah,t.AkunDari,t.AkunKe]); let csv=[headers,...rows].map(r=>r.map(c=>`"${c}"`).join(",")).join("\n"); let blob=new Blob([csv],{type:"text/csv"}); let link=document.createElement("a"); link.href=URL.createObjectURL(blob); link.download=`transaksi_${tahun}.csv`; link.click(); }
</script>
